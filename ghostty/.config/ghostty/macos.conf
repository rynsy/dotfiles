# macOS-specific Ghostty config
# Only stow this file on Mac (or leave it — ignored on Linux if unused)

# Translate Cmd+b → Ctrl+b (0x02) for tmux prefix
# Needed because ZMK Mac layer remaps physical Ctrl → Cmd
keybind = cmd+b=text:\x02

# Other Cmd → Ctrl passthroughs for terminal use
# Add more as needed if Cmd+key should send Ctrl+key to the terminal
keybind = cmd+c=text:\x03
keybind = cmd+d=text:\x04
keybind = cmd+r=text:\x12
keybind = cmd+l=text:\x0c
keybind = cmd+a=text:\x01
keybind = cmd+w=text:\x17
keybind = cmd+k=text:\x0b
keybind = cmd+p=text:\x10
keybind = cmd+n=text:\x0e

# macOS window chrome
window-theme = auto
macos-titlebar-style = transparent
