# macOS-specific Ghostty config
# Only stow this file on Mac (or leave it — ignored on Linux if unused)

# Translate Cmd+b → Ctrl+b (0x02) for tmux prefix
# Needed because ZMK Mac layer remaps physical Ctrl → Cmd
keybind = cmd+b=text:\x02

# DO NOT add blanket cmd+key→ctrl mappings here.
# The ZMK Mac layer swaps Ctrl↔Cmd so that:
#   - Left Ctrl (sends Cmd) → GUI shortcuts (copy, paste, etc.)
#   - Right GUI (sends Ctrl) → terminal signals (SIGINT, history, etc.)
#
# If you remap cmd+c=text:\x03 here, you lose the ability to copy
# in Ghostty entirely. Use the right thumb (Ctrl) for terminal signals.
#
# Only cmd+b is remapped because tmux prefix is awkward to reach
# with the right thumb + b.

# macOS window chrome
window-theme = auto
macos-titlebar-style = transparent

# Send ESC+key sequences for Option+key (needed for Alt bindings in tmux/nvim)
macos-option-as-alt = left

# Font size (base config uses 9 which is too small on Mac)
font-size = 13

# Initial window size
window-width = 220
window-height = 50
