# =============================================================================
# tmux.conf — Main Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Core Settings
# -----------------------------------------------------------------------------

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB,xterm-ghostty:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Mouse support
set -g mouse on

# Vi mode for copy-mode
setw -g mode-keys vi

# No escape delay (critical for nvim)
set -sg escape-time 0

# Scrollback history
set -g history-limit 50000

# Focus events (for nvim autoread)
set -g focus-events on

# Allow tmux to set terminal clipboard
set -s set-clipboard on

# Display messages for 3 seconds
set -g display-time 3000

# -----------------------------------------------------------------------------
# Keybindings — Pane Navigation
# -----------------------------------------------------------------------------

# vim-tmux-navigator — seamless Ctrl+hjkl between nvim splits and tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l

# prefix+Ctrl-l — clear screen (since C-l is now navigator)
bind C-l send-keys 'C-l'

# prefix+| — vertical split (current path)
bind | split-window -h -c "#{pane_current_path}"

# prefix+- — horizontal split (current path)
bind - split-window -v -c "#{pane_current_path}"

# prefix+HJKL — resize panes (5 cells at a time)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# Keybindings — Sessions
# -----------------------------------------------------------------------------

# prefix+f — launch sessionizer (fzf popup)
bind f run-shell "tmux display-popup -E -w 80% -h 60% ~/.config/tmux/scripts/sessionizer.sh"

# -----------------------------------------------------------------------------
# Keybindings — Copy Mode (vi)
# -----------------------------------------------------------------------------

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# y is handled by tmux-yank (loaded via TPM below) — no manual binding needed

# -----------------------------------------------------------------------------
# Keybindings — Utility
# -----------------------------------------------------------------------------

# prefix+r — reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Scroll/copy-mode improvements
bind -n S-PageUp copy-mode -u
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# -----------------------------------------------------------------------------
# Catppuccin Theme — Mocha
# -----------------------------------------------------------------------------

set -g @catppuccin_flavor "mocha"

# Window status
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Status bar
set -g status-left-length 100
set -g status-right-length 100

# Load catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Status left: session name
set -g status-left "#{E:@catppuccin_status_session}"

# Status right: directory + date/time
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

# -----------------------------------------------------------------------------
# Plugin Settings
# -----------------------------------------------------------------------------

# tmux-continuum: auto-restore, save every 15 minutes
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-resurrect: default bindings (prefix+Ctrl-s save, prefix+Ctrl-r restore)

# tmux-yank: auto-detects wl-copy on Wayland

# -----------------------------------------------------------------------------
# Initialize TPM (keep this at the very bottom)
# -----------------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
