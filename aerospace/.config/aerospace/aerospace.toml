# =============================================================================
# Aerospace — Tiling WM for macOS
# Keybindings mirror Hyprland/Omarchy setup (Cmd as modifier)
#
# With ZMK Mac layer: physical Left Ctrl sends Cmd, so the same finger
# that hits Super on Linux (right thumb GUI) now... wait, no:
# On Linux, Super is right thumb. On Mac, Cmd is left thumb (physical Ctrl).
# The WM modifier is a DIFFERENT physical key per OS, but the muscle memory
# for the RIGHT HAND patterns (hjkl, 1-9) is identical.
# =============================================================================

# Start at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focus-changed = ['move-mouse window-lazy-center']

# Layout settings
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Gaps (match Hyprland looknfeel)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# =============================================================================
# Keybindings — Main mode
# =============================================================================
#
# Using Cmd as modifier. On ZMK Mac layer, physical Left Ctrl = Cmd.
#
# NOTE: Cmd+h is macOS "hide app" — Aerospace overrides it.
# NOTE: Cmd+t/f/r/1-9 conflict with macOS/app defaults, but Aerospace
# intercepts at the WM level before apps see them. This is the same
# tradeoff as Hyprland intercepting Super+key on Linux.
#
# Known trade-offs vs stock macOS:
#   Cmd+Tab   → NOT intercepted (kept for macOS app switcher)
#   Cmd+H     → focus left (overrides macOS "hide app")
#   Cmd+F     → fullscreen (overrides in-app Find)
#   Cmd+T     → toggle float (overrides new tab in browsers)
#   Cmd+R     → resize mode (overrides browser refresh)
#   Cmd+1-9   → workspaces (overrides browser tab switching)
#   Cmd+W     → NOT intercepted (kept for macOS close tab/window)
#   Cmd+S     → NOT intercepted (kept for macOS save)
#   Cmd+C/V/X → NOT intercepted (kept for copy/paste/cut)

[mode.main.binding]

# -- Focus (Cmd + h/j/k/l) — matches Hyprland Super+Arrow --
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'

# -- Move window (Cmd+Shift + h/j/k/l) — matches Hyprland Super+Shift+Arrow --
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# -- Switch workspace (Cmd + 1-9) — matches Hyprland Super+1-9 --
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# -- Move window to workspace (Cmd+Shift + 1-9) — matches Hyprland Super+Shift+1-9 --
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'

# -- Cycle workspaces (Alt + Tab) --
# NOT Cmd+Tab — that's the macOS app switcher and too ingrained to override.
# On Hyprland, Super+Tab = next workspace, Alt+Tab = cycle windows.
# Here Alt+Tab = next workspace, Cmd+Tab = macOS app switcher.
alt-tab = 'workspace next'
alt-shift-tab = 'workspace prev'

# -- Fullscreen (Cmd + f) — matches Hyprland Super+F --
cmd-f = 'fullscreen'

# -- Toggle floating (Cmd + t) — matches Hyprland Super+T --
cmd-t = 'layout floating tiling'

# -- Toggle split direction --
cmd-slash = 'layout tiles horizontal vertical'

# -- Move window to monitor (Cmd+Ctrl+Shift + h/j/k/l) — matches Hyprland --
cmd-ctrl-shift-h = ['move-node-to-monitor left', 'focus-monitor left']
cmd-ctrl-shift-l = ['move-node-to-monitor right', 'focus-monitor right']
cmd-ctrl-shift-k = ['move-node-to-monitor up', 'focus-monitor up']
cmd-ctrl-shift-j = ['move-node-to-monitor down', 'focus-monitor down']

# -- Focus monitor (Cmd+Ctrl + h/l) --
cmd-ctrl-h = 'focus-monitor left'
cmd-ctrl-l = 'focus-monitor right'
cmd-ctrl-k = 'focus-monitor up'
cmd-ctrl-j = 'focus-monitor down'

# -- Bluetooth (Cmd+Ctrl + b) — matches Omarchy Super+Ctrl+B --
cmd-ctrl-b = 'exec-and-forget open x-apple.systempreferences:com.apple.BluetoothSettings'

# -- Resize mode (Cmd + r) --
cmd-r = 'mode resize'

# -- Service mode (Cmd + Shift + semicolon) --
cmd-shift-semicolon = 'mode service'

# =============================================================================
# Resize mode
# =============================================================================

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
escape = 'mode main'

# =============================================================================
# Service mode — for less frequent actions
# =============================================================================

[mode.service.binding]
r = ['flatten-workspace-tree', 'mode main']    # Reset layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
enter = 'mode main'
escape = 'mode main'

# =============================================================================
# Workspace-to-monitor assignment (adjust for your Mac setup)
# =============================================================================

# Uncomment and adjust when you know your monitor setup:
# [workspace-to-monitor-force-assignment]
# 1 = 'main'
# 2 = 'main'
# 3 = 'main'
# 4 = 'main'
# 5 = 'secondary'
# 6 = 'secondary'
# 7 = 'secondary'
