# =============================================================================
# Aerospace — Tiling WM for macOS
# Keybindings mirror Hyprland/Omarchy setup (Alt instead of Super)
# =============================================================================

# Start at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focus-changed = ['move-mouse window-lazy-center']

# Layout settings
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Gaps (match Hyprland looknfeel)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# =============================================================================
# Keybindings — Main mode
# =============================================================================

[mode.main.binding]

# -- Focus (Alt + h/j/k/l) — matches Hyprland Super+Arrow/focus direction --
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# -- Move window (Alt+Shift + h/j/k/l) — matches Hyprland Super+Shift+Arrow --
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# -- Switch workspace (Alt + 1-9) — matches Hyprland Super+1-9 --
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# -- Move window to workspace (Alt+Shift + 1-9) — matches Hyprland Super+Shift+1-9 --
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# -- Cycle workspaces (Alt + Tab) — matches Hyprland Super+Tab --
alt-tab = 'workspace next'
alt-shift-tab = 'workspace prev'

# -- Fullscreen (Alt + f) — matches Hyprland Super+F --
alt-f = 'fullscreen'

# -- Toggle floating (Alt + t) — matches Hyprland Super+T --
alt-t = 'layout floating tiling'

# -- Toggle split direction (Alt + j) is taken, use Alt+slash --
alt-slash = 'layout tiles horizontal vertical'

# -- Move window to monitor (Alt+Ctrl+Shift + h/l) — matches Hyprland Super+Ctrl+Shift --
alt-ctrl-shift-h = ['move-node-to-monitor left', 'focus-monitor left']
alt-ctrl-shift-l = ['move-node-to-monitor right', 'focus-monitor right']
alt-ctrl-shift-k = ['move-node-to-monitor up', 'focus-monitor up']
alt-ctrl-shift-j = ['move-node-to-monitor down', 'focus-monitor down']

# -- Focus monitor (Alt+Ctrl + h/l) --
alt-ctrl-h = 'focus-monitor left'
alt-ctrl-l = 'focus-monitor right'
alt-ctrl-k = 'focus-monitor up'
alt-ctrl-j = 'focus-monitor down'

# -- Resize mode (Alt + r) --
alt-r = 'mode resize'

# -- Service mode (Alt + Shift + semicolon) --
alt-shift-semicolon = 'mode service'

# =============================================================================
# Resize mode
# =============================================================================

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
escape = 'mode main'

# =============================================================================
# Service mode — for less frequent actions
# =============================================================================

[mode.service.binding]
r = ['flatten-workspace-tree', 'mode main']    # Reset layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
enter = 'mode main'
escape = 'mode main'

# =============================================================================
# Workspace-to-monitor assignment (adjust for your Mac setup)
# =============================================================================

# Uncomment and adjust when you know your monitor setup:
# [workspace-to-monitor-force-assignment]
# 1 = 'main'
# 2 = 'main'
# 3 = 'main'
# 4 = 'main'
# 5 = 'secondary'
# 6 = 'secondary'
# 7 = 'secondary'
